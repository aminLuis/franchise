version: '3.9'

services:

  mysql:

    image: mysql:8.4

    container_name: franchise-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: franchise_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - franchise-network

  franchise-api:

    build: .

    container_name: franchise-api

    restart: always

    depends_on:
      - mysql

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    networks:
      - franchise-network

networks:
  franchise-network:

volumes:
  mysql_data: